<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>🚨 MIRAI CORE - BLUEPRINTS LEAK</title>
    <style>
        :root {
            --primary: #00ff66;
            --bg: #050706;
            --glow: rgba(0, 255, 102, 0.4);
        }

        body {
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Courier New', Courier, monospace, sans-serif;
            margin: 0; padding: 15px;
            min-height: 100vh; box-sizing: border-box;
            display: flex; flex-direction: column; align-items: center;
            position: relative;
        }

        /* خطوط الشاشة العسكرية القديمة */
        body::before {
            content: " "; display: block; position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            z-index: 20; background-size: 100% 4px; pointer-events: none;
        }

        .hacker-box {
            border: 2px solid var(--primary);
            background: rgba(4, 10, 6, 0.95);
            box-shadow: 0 0 25px var(--glow), inset 0 0 15px rgba(0, 255, 102, 0.1);
            max-width: 800px; width: 100%;
            padding: 25px; border-radius: 8px;
            text-align: center; position: relative; z-index: 10;
        }

        .header-title {
            font-size: 22px; font-weight: bold; letter-spacing: 1px;
            border-bottom: 2px dashed var(--primary);
            padding-bottom: 12px; margin-bottom: 20px;
            text-shadow: 0 0 8px var(--primary);
        }

        .tabs {
            display: flex; justify-content: center; gap: 15px; margin-bottom: 20px;
        }

        .btn-tab {
            background: transparent; color: var(--primary);
            border: 2px solid var(--primary);
            padding: 12px 20px; font-family: monospace; font-size: 15px;
            cursor: pointer; font-weight: bold; transition: all 0.3s; width: 48%;
        }

        .btn-tab.active {
            background: var(--primary); color: #000;
            box-shadow: 0 0 20px var(--primary);
        }

        /* تبويب الملف السري المحظور */
        .btn-tab.secret { color: #ff0033; border-color: #ff0033; }
        .btn-tab.secret.active { background: #ff0033; color: #fff; box-shadow: 0 0 20px #ff0033; }

        /* منطقة عرض وتأثير مسح الصور */
        .viewer-frame {
            border: 1px solid rgba(0, 255, 102, 0.3);
            background: #000000; padding: 10px;
            border-radius: 6px; position: relative;
            overflow: hidden; display: flex; flex-direction: column; align-items: center;
        }

        .blueprint-img {
            max-width: 100%; max-height: 450px;
            object-fit: contain; display: none;
            z-index: 5;
        }

        .blueprint-img.active { display: block; animation: glitch-appear 0.3s ease; }

        /* تأثير خط مسح الليزر المتحرك */
        .laser-line {
            position: absolute; left: 0; width: 100%; height: 4px;
            background: var(--primary); box-shadow: 0 0 15px var(--primary);
            z-index: 8; top: 0;
            animation: scan-move 3s linear infinite;
        }

        /* أزرار التحميل لأسفل الشاشة */
        .download-btn {
            margin-top: 20px; background: transparent;
            color: var(--primary); border: 1px solid var(--primary);
            padding: 10px 25px; font-size: 14px; font-weight: bold;
            cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
            transition: all 0.2s; font-family: sans-serif;
        }
        .download-btn:hover { background: rgba(0, 255, 102, 0.1); box-shadow: 0 0 10px var(--primary); }

        @keyframes scan-move {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        @keyframes glitch-appear {
            0% { opacity: 0.5; filter: contrast(2) brightness(1.5); }
            100% { opacity: 1; filter: none; }
        }

        @media (min-width: 768px) {
            .header-title { font-size: 26px; }
            .hacker-box { padding: 40px; }
        }
    </style>
</head>
<body>

    <div class="hacker-box" id="panel">
        <div class="header-title" id="headerText">⚙️ نظام الاختراق السلكي - مستخرج البيانات</div>
        
        <div class="tabs">
            <button class="btn-tab active" onclick="changeMode('general', this)">المخطط المعماري العام</button>
            <button class="btn-tab secret" onclick="changeMode('secret', this)">⚠️ خرق ملف الاحتواء السري</button>
        </div>

        <div class="viewer-frame" id="frame">
            <!-- خط الليزر الوامض -->
            <div class="laser-line" id="laser"></div>
            
            <img id="imgGeneral" class="blueprint-img active" src="general.png" alt="General Plan">
            <img id="imgSecret" class="blueprint-img" src="secret.png" alt="Secret Plan">
        </div>

        <!-- زر التحميل الديناميكي المتغير حسب المخطط المعروض -->
        <a id="downloadLink" href="general.png" download="Mirai_General_Blueprint.png">
            <button class="download-btn" id="dlBtn">📥 تحميل المخطط العام بدقة عالية</button>
        </a>
    </div>

    <script>
        function changeMode(mode, btn) {
            document.querySelectorAll('.btn-tab').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.blueprint-img').forEach(i => i.classList.remove('active'));
            
            btn.classList.add('active');
            
            const panel = document.getElementById('panel');
            const frame = document.getElementById('frame');
            const laser = document.getElementById('laser');
            const header = document.getElementById('headerText');
            const dlBtn = document.getElementById('dlBtn');
            const dlLink = document.getElementById('downloadLink');

            if(mode === 'general') {
                document.getElementById('imgGeneral').classList.add('active');
                document.documentElement.style.setProperty('--primary', '#00ff66');
                document.documentElement.style.setProperty('--glow', 'rgba(0, 255, 102, 0.4)');
                header.innerText = "⚙️ نظام الاختراق السلكي - مستخرج البيانات";
                dlBtn.innerText = "📥 تحميل المخطط العام بدقة عالية";
                dlLink.href = "general.png";
                dlLink.download = "Mirai_General_Blueprint.png";
            } else {
                document.getElementById('imgSecret').classList.add('active');
                document.documentElement.style.setProperty('--primary', '#ff0033');
                document.documentElement.style.setProperty('--glow', 'rgba(255, 0, 51, 0.5)');
                header.innerText = "🚨 تحذير أمني: تم تسريب بيانات الغرفة المركزية";
                dlBtn.innerText = "📥 تحميل الملف السري المسرب للبرج";
                dlLink.href = "secret.png";
                dlLink.download = "Mirai_RESTRICTED_Blueprint.png";
            }
        }
    </script>
</body>
</html>
